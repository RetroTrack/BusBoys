name: Snyk Unity Test Automation

on:
  push:

jobs:
  snyk-sca:
    name: Unity dependency scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Verify Unity package files
        run: |
          test -f Packages/manifest.json
          test -f Packages/packages-lock.json

      - name: Run Snyk Open Source test
        run: |
          snyk test \
            --all-projects \
            --detection-depth=3 \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  #  Snyk SAST (code analysis) 
  snyk-sast:
    name: Snyk SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write   # required to upload SARIF to the Security tab
    # if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Snyk Code — static analysis
        uses: snyk/actions/node@master
        continue-on-error: true   # upload SARIF even when issues are found
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif --all-projects

      - name: Archive sarif file
        uses: actions/upload-artifact@v7
        with:
          name: sarif-output-file
          path: snyk-code.sarif

      # Only works on orgs or public repo's so for now disabled
      #- name: Upload Snyk Code results to GitHub Security tab
      #  uses: github/codeql-action/upload-sarif@v4
      #  with:
      #    sarif_file: snyk-code.sarif
